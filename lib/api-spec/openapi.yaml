openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Hex Auth API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: apps
    description: Application management
  - name: users
    description: User management
  - name: licenses
    description: License key management
  - name: logs
    description: Event logs
  - name: sessions
    description: Active session management
  - name: blacklist
    description: Blacklist management
  - name: subscriptions
    description: Subscription management
  - name: settings
    description: Account and application settings
  - name: sdk
    description: SDK authentication endpoints
  - name: stats
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify email with OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInput"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email/username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/my-teams:
    get:
      operationId: getMyTeams
      tags: [auth]
      summary: Get teams the current user belongs to as a member
      responses:
        "200":
          description: Teams the user has joined
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MyTeam"

  # Apps
  /apps:
    get:
      operationId: getApps
      tags: [apps]
      summary: List all applications
      responses:
        "200":
          description: List of apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/App"
    post:
      operationId: createApp
      tags: [apps]
      summary: Create a new application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppInput"
      responses:
        "201":
          description: App created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"

  /apps/{id}:
    get:
      operationId: getApp
      tags: [apps]
      summary: Get a specific application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: App details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateApp
      tags: [apps]
      summary: Update an application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppUpdate"
      responses:
        "200":
          description: App updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"
    delete:
      operationId: deleteApp
      tags: [apps]
      summary: Delete an application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: App deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /apps/{id}/rotate-token:
    post:
      operationId: rotateAppToken
      tags: [apps]
      summary: Rotate application API token
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Token rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"

  # Users
  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List all app users (SDK users)
      parameters:
        - name: appId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of app users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ManagedUser"
    post:
      operationId: createAppUser
      tags: [users]
      summary: Create an app user (SDK user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppUserInput"
      responses:
        "201":
          description: App user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedUser"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a specific app user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedUser"
    delete:
      operationId: deleteAppUser
      tags: [users]
      summary: Delete an app user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}/rotate-token:
    post:
      operationId: rotateUserToken
      tags: [users]
      summary: Rotate an app user's API token
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Token rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedUser"

  /users/{id}/ban:
    post:
      operationId: banUser
      tags: [users]
      summary: Ban a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedUser"

  /users/{id}/unban:
    post:
      operationId: unbanUser
      tags: [users]
      summary: Unban a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User unbanned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedUser"

  /users/{id}/reset-hwid:
    post:
      operationId: resetUserHwid
      tags: [users]
      summary: Reset a user's HWID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: HWID reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedUser"

  /users/{id}/plan:
    patch:
      operationId: updateUserPlan
      tags: [users]
      summary: Change a user's plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPlanUpdate"
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedUser"

  /users/{id}/subscription:
    patch:
      operationId: updateUserSubscription
      tags: [users]
      summary: Update user subscription expiry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSubscriptionUpdate"
      responses:
        "200":
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedUser"

  # Licenses
  /licenses:
    get:
      operationId: getLicenses
      tags: [licenses]
      summary: List all license keys
      responses:
        "200":
          description: List of licenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/License"

  /licenses/generate:
    post:
      operationId: generateLicense
      tags: [licenses]
      summary: Generate a new license key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseInput"
      responses:
        "201":
          description: License generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"

  /licenses/redeem:
    post:
      operationId: redeemLicense
      tags: [licenses]
      summary: Redeem a license key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseRedeemInput"
      responses:
        "200":
          description: License redeemed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
        "400":
          description: Invalid or already used key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /licenses/{id}:
    delete:
      operationId: deleteLicense
      tags: [licenses]
      summary: Delete a license key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: License deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # Logs
  /logs:
    get:
      operationId: getLogs
      tags: [logs]
      summary: Get event logs
      parameters:
        - name: filter
          in: query
          required: false
          schema:
            type: string
            enum: [all, good, bad, warn, info]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Event logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventLog"

  # Sessions
  /sessions:
    get:
      operationId: getSessions
      tags: [sessions]
      summary: List active sessions
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  /sessions/{id}:
    delete:
      operationId: killSession
      tags: [sessions]
      summary: Kill an active session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session killed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # Blacklist
  /blacklist:
    get:
      operationId: getBlacklist
      tags: [blacklist]
      summary: List blacklisted entries
      responses:
        "200":
          description: Blacklist entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlacklistEntry"
    post:
      operationId: addBlacklist
      tags: [blacklist]
      summary: Add a blacklist entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlacklistInput"
      responses:
        "201":
          description: Entry added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlacklistEntry"

  /blacklist/{id}:
    delete:
      operationId: removeBlacklist
      tags: [blacklist]
      summary: Remove a blacklist entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entry removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # Subscriptions
  /subscriptions:
    get:
      operationId: getSubscriptions
      tags: [subscriptions]
      summary: List all subscriptions
      responses:
        "200":
          description: Subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscription"

  # Settings
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

  /settings/profile:
    put:
      operationId: updateProfile
      tags: [settings]
      summary: Update profile settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /settings/password:
    put:
      operationId: updatePassword
      tags: [settings]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordUpdate"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings/webhook:
    put:
      operationId: updateWebhook
      tags: [settings]
      summary: Update Discord webhook URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookUpdate"
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /settings/team:
    get:
      operationId: getTeam
      tags: [settings]
      summary: Get team members
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"

  /settings/team/invite:
    post:
      operationId: inviteTeamMember
      tags: [settings]
      summary: Invite a team member via email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInviteInput"
      responses:
        "200":
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /settings/team/{userId}:
    delete:
      operationId: removeTeamMember
      tags: [settings]
      summary: Remove a team member
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /settings/team/accept/{token}:
    get:
      operationId: acceptTeamInvite
      tags: [settings]
      summary: Accept a team invitation
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invitation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /settings/credentials:
    get:
      operationId: getCredentials
      tags: [settings]
      summary: Get app credentials (App ID, secret)
      responses:
        "200":
          description: Credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credentials"

  # Dashboard stats
  /stats:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/activity:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventLog"

  /stats/active-users:
    get:
      operationId: getActiveUsersChart
      tags: [stats]
      summary: Get active users chart data
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: ["24h", "7d", "30d", "all"]
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartDataPoint"

  /stats/plan-mix:
    get:
      operationId: getPlanMix
      tags: [stats]
      summary: Get plan distribution
      responses:
        "200":
          description: Plan mix
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanMixItem"

  # SDK
  /sdk/login:
    post:
      operationId: sdkLogin
      tags: [sdk]
      summary: SDK user authentication with HWID binding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SdkLoginInput"
      responses:
        "200":
          description: Authentication result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SdkAuthResult"

  /sdk/validate:
    post:
      operationId: sdkValidate
      tags: [sdk]
      summary: Validate an active session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SdkValidateInput"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SdkAuthResult"

  /sdk/variable/{name}:
    get:
      operationId: sdkGetVariable
      tags: [sdk]
      summary: Get a runtime variable value
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Variable value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SdkVariable"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        message:
          type: ["string", "null"]

    # Auth schemas
    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    VerifyEmailInput:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
        code:
          type: string

    LoginInput:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        token:
          type: ["string", "null"]
        user:
          $ref: "#/components/schemas/User"
        requiresVerification:
          type: ["boolean", "null"]
        message:
          type: ["string", "null"]

    User:
      type: object
      required: [id, username, email, plan, status, role, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        plan:
          type: string
        status:
          type: string
        role:
          type: string
        emailVerified:
          type: ["boolean", "null"]
        subscriptionExpiry:
          type: ["string", "null"]
        webhookUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    # App schemas
    App:
      type: object
      required: [id, name, version, apiToken, appId, status, userCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        version:
          type: string
        apiToken:
          type: string
        appId:
          type: string
        appSecret:
          type: ["string", "null"]
        status:
          type: string
        userCount:
          type: integer
        createdAt:
          type: string

    AppInput:
      type: object
      required: [name, version]
      properties:
        name:
          type: string
        version:
          type: string

    AppUpdate:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        status:
          type: string

    # Managed user / App SDK user (admin view)
    ManagedUser:
      type: object
      required: [id, username, email, plan, status, hwid, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        plan:
          type: string
        status:
          type: string
        hwid:
          type: ["string", "null"]
        subscriptionExpiry:
          type: ["string", "null"]
        token:
          type: ["string", "null"]
        bypassHwid:
          type: ["boolean", "null"]
        maxConcurrentSessions:
          type: ["integer", "null"]
        lastLoginAt:
          type: ["string", "null"]
        appId:
          type: ["string", "null"]
        createdAt:
          type: string

    CreateAppUserInput:
      type: object
      required: [username, password, plan]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
        password:
          type: string
          minLength: 6
        plan:
          type: string
        expiresAt:
          type: ["string", "null"]
        bypassHwid:
          type: boolean
        maxConcurrentSessions:
          type: integer
