kind = "web"
previewPath = "/"
title = "Hex Auth"
version = "1.0.0"
id = "artifacts/hex-auth"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21560

[services.development]
run = "pnpm --filter @workspace/hex-auth run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hex-auth", "run", "build" ]
publicDir = "artifacts/hex-auth/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21560"
BASE_PATH = "/"
